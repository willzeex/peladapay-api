name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DOTNET_VERSION: 9.0.x
  BUILD_CONFIGURATION: Release
  RUNTIME: linux-x64
  IMAGE_NAME: ghcr.io/${{ github.repository }}:latest

jobs:
  build:
    name: Build, Bundle Migrations, and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # Restore entire solution (best practice)
      - name: Restore solution
        run: dotnet restore

      # Build entire solution
      - name: Build solution
        run: |
          dotnet build \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-restore
      - name: Generate EF Core migration bundle
        env:
            ASPNETCORE_ENVIRONMENT: Development
        run: |
            mkdir -p deploy

            dotnet ef migrations bundle \
                --project src/PeladaPay.Infrastructure/PeladaPay.Infrastructure.csproj \
                --startup-project src/PeladaPay.Api/PeladaPay.Api.csproj \
                --configuration ${{ env.BUILD_CONFIGURATION }} \
                --runtime ${{ env.RUNTIME }} \
                --self-contained \
                --output deploy/migrate \
                --force \
                --no-build

            chmod +x deploy/migrate

      - name: Upload migration bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-bundle
          path: deploy/migrate
          if-no-files-found: error

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

  deploy:
    name: Deploy to Linux host via SSH
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: read

    steps:
      - name: Download migration bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: migration-bundle
          path: tmp-bundle

      - name: Copy migration bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "tmp-bundle/migrate"
          target: "~/apps/peladapay-api"
          strip_components: 1

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            APP_DIR="$HOME/apps/peladapay-api"
            cd "$APP_DIR"

            cat > .env <<EOF
            ASPNETCORE_ENVIRONMENT=${{ vars.ASPNETCORE_ENVIRONMENT }}
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ConnectionStrings__DefaultConnection=Host=peladapay-db;Port=5432;Database=${{ vars.POSTGRES_DB }};Username=${{ vars.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }}
            EOF

            chmod +x ./migrate

            echo "Starting database container..."
            docker compose up -d peladapay-db

            echo "Running EF Core migrations..."
            ./migrate --connection "Host=localhost;Port=5432;Database=${{ vars.POSTGRES_DB }};Username=${{ vars.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }}"

            echo "Login to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "Updating containers..."
            docker compose up -d --pull always

            echo "Checking container health..."
            for i in $(seq 1 24); do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' peladapay-api 2>/dev/null || true)

              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                echo "Container peladapay-api is $status"
                break
              fi

              if [ "$i" -eq 24 ]; then
                echo "ERROR: peladapay-api failed health check"
                docker logs --tail=200 peladapay-api || true
                exit 1
              fi

              sleep 5
            done

            echo "Cleaning unused images..."
            docker image prune -af

            rm -f ./migrate