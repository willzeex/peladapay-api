name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        # Restauramos focando no projeto da API para evitar erro de .sln com runtime
        run: dotnet restore src/PeladaPay.Api/PeladaPay.Api.csproj -r linux-x64

      - name: Build
        # Compilamos o projeto da API com o runtime correto para o bundle
        run: dotnet build src/PeladaPay.Api/PeladaPay.Api.csproj --configuration Release --no-restore -r linux-x64

      - name: Install EF CLI
        run: dotnet tool install --global dotnet-ef

      - name: Generate migration bundle
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p deploy
          
          # Gera o bundle nativo para o Linux da Oracle Cloud
          dotnet ef migrations bundle \
            --project src/PeladaPay.Infrastructure/PeladaPay.Infrastructure.csproj \
            --startup-project src/PeladaPay.Api/PeladaPay.Api.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained \
            --output deploy/migrate \
            --force --no-build

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Upload migration bundle
        uses: actions/upload-artifact@v4
        with:
          name: migration-bundle
          path: deploy/migrate

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download migration bundle
        uses: actions/download-artifact@v4
        with:
          name: migration-bundle
          path: tmp-bundle

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "tmp-bundle/migrate"
          target: "~/apps/peladapay-api"
          strip_components: 1

      - name: Execute Remote Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/peladapay-api
            
            # Dá permissăo de execuçăo ao binário de migraçăo
            chmod +x ./migrate

            echo "Running database migrations..."
            # Executa a migraçăo usando a connection string do segredo do GitHub
            ./migrate --connection "Host=localhost;Port=5432;Database=${{ vars.POSTGRES_DB }};Username=${{ vars.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }}"

            echo "Updating Environment File..."
            cat > .env <<EOF
            ASPNETCORE_ENVIRONMENT=${{ vars.ASPNETCORE_ENVIRONMENT }}
            ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${{ vars.POSTGRES_DB }};Username=${{ vars.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }}
            EOF

            echo "Logging into GHCR..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Deploying Docker Containers..."
            docker compose pull
            docker compose up -d --remove-orphans

            echo "Cleaning up..."
            docker image prune -f
            rm ./migrate