services:
  plynt-api:
    image: ghcr.io/willzeex/peladapay-api:latest

    restart: unless-stopped

    env_file:
      - .env

    environment:
      ASPNETCORE_URLS: http://+:5000

    networks:
      - traefik

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.peladapay-api.rule=Host(`api.peladapay.duckdns.org`)"
      - "traefik.http.routers.peladapay-api.entrypoints=websecure"
      - "traefik.http.routers.peladapay-api.tls.certresolver=myresolver"
      - "traefik.http.services.peladapay-api.loadbalancer.server.port=5000"

networks:
  traefik:
    external: true